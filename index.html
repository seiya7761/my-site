<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #222;
      background: #f4f7f8;
    }

    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 32px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #176b87;
      font-size: 2rem;
    }

    h2 {
      margin-top: 32px;
      border-bottom: 2px solid #d8e8ee;
      padding-bottom: 6px;
      color: #333;
    }

    ul {
      padding-left: 1.3rem;
    }

    .profile {
      font-size: 1.1rem;
    }

    .tag {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      background: #e8f3f6;
      border-radius: 999px;
      color: #176b87;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>こんにちは、長谷川誠也です</h1>

    <p class="profile">
      Web制作とプログラミングに興味があります。新しい技術を学びながら、
      使いやすく見やすいページを作ることを目指しています。
    </p>

    <h2>基本情報</h2>
    <ul>
      <li>名前: 長谷川誠也</li>
      <li>出身: 東京都</li>
      <li>趣味: 読書、音楽、散歩</li>
    </ul>

    <h2>研究内容</h2>
    <ol>
      <li>貝殻の微細構造の研究</li>
      <li>炭酸カルシウムの合成制御</li>
      <li>機能性材料の創出</li>
    </ol>

    <h2>スキル</h2>
    <div>
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">JavaScript</span>
      <span class="tag">Webデザイン</span>
    </div>
  </main>
</body>
</html>
